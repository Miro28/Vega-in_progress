<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VEGA AR STAR MAP</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="theme-color" content="#05080f">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine/astronomy.browser.min.js"></script>
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
          }
        }
    </script>
</head>
<body>

    <div id="introOverlay">
        <canvas id="introStars"></canvas>
        <div class="intro-content">
            <h1>VEGA</h1>
            <p>Astrometry &amp; Augmented Reality</p>
            <button id="startAppBtn" class="primary-btn">Initialize System</button>
            <p class="portrait-hint">Best viewed in portrait. Keep your phone upright.</p>
        </div>
    </div>

    <div id="arUI" class="hidden">
        <div id="crosshair">
            <div class="reticle"></div>
            <div id="starLabel"></div>
        </div>

        <div id="hudTop">
            <button id="cameraBtn" class="hud-btn small">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                Camera
            </button>
            <button id="linesBtn" class="hud-btn small">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 18 L9 6 L15 15 L21 4"></path>
                </svg>
                Lines
            </button>
        </div>

        <div id="timePanel">
            <input type="range" id="timeSlider" min="-1000" max="1000" value="0">
            <div id="timeRow">
                <span id="timeReadout">Live</span>
                <button id="resetTimeBtn">Now</button>
            </div>
        </div>

        <div id="hudBottom">
            <button id="identifyBtn" class="hud-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
                </svg>
                Identify
            </button>
            <button id="calBtn" class="hud-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                Sync
            </button>
        </div>
    </div>

    <div id="landscapeNotice" class="hidden">
        <div class="landscape-inner">
            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="7" y="2" width="10" height="20" rx="2"></rect>
                <path d="M11 18h2"></path>
            </svg>
            <p>Rotate your phone to portrait</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
